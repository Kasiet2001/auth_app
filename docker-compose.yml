services:
  db:
    image: postgres
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env
    networks:
      - network_buff

  web:
    build:
      context: .
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    networks:
      - network_buff
    links:
      - db:db
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db

volumes:
  db_data:

networks:
  network_buff:
    driver: bridge